spring.application.name=receta-backend-api

# Database Configuration (use environment variables or profiles to override)
spring.datasource.url=${DB_URL:jdbc:h2:mem:recetadb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}

# Security - H2 Console disabled by default (enable only in development)
spring.h2.console.enabled=true
spring.h2.console.path=${H2_CONSOLE_PATH:/h2-console}

# Application Configuration
server.port=${SERVER_PORT:8080}

# SQL Initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SQL_INIT_MODE:embedded}

# Logging Configuration (production safe defaults)
logging.level.com.duoc.seguridadcalidad=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}

# Profile Configuration
# Use: java -jar app.jar --spring.profiles.active=dev
# Or set SPRING_PROFILES_ACTIVE=dev environment variable

# Subida de Archivos Multimedia
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
